<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Shooter</title>
<style>
  /* ── Reset ── */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
  }

  /* Spielfeld-Canvas zentriert darstellen */
  canvas {
    display: block;
    margin: 0 auto;
  }

  /* ── HUD: Punkte, Leben und Level oben auf dem Canvas ── */
  #ui {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    font-size: 18px;
    z-index: 10;
    pointer-events: none;
  }

  /* ── Startbildschirm & Game-Over-Bildschirm ── */
  #startScreen, #gameOverScreen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    z-index: 20;
  }

  /* Game-Over-Screen initial verbergen */
  #gameOverScreen { display: none; }

  h1 {
    font-size: 48px;
    margin-bottom: 10px;
    color: #0ff;
    text-shadow: 0 0 20px #0ff;
  }

  h2 {
    font-size: 28px;
    color: #f55;
    text-shadow: 0 0 15px #f55;
    margin-bottom: 10px;
  }

  /* Anleitungs-Text und sonstige Info-Absätze */
  .info {
    font-size: 16px;
    color: #aaa;
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.6;
  }

  /* Aktions-Buttons (Start / Nochmal) */
  button {
    padding: 12px 40px;
    font-size: 20px;
    font-family: 'Courier New', monospace;
    background: transparent;
    color: #0ff;
    border: 2px solid #0ff;
    cursor: pointer;
    transition: all 0.3s;
  }

  button:hover {
    background: #0ff;
    color: #000;
  }

  /* Endpunktzahl auf dem Game-Over-Screen */
  #finalScore {
    font-size: 22px;
    color: #ff0;
    margin-bottom: 20px;
  }

  /* ── Navigationslinks im Start- und Game-Over-Screen ── */
  .screen-nav {
    margin-top: 1.5rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .screen-nav a {
    font-size: 14px;
    color: #0ff;
    text-decoration: none;
    border: 1px solid #0ff;
    padding: 0.4rem 1rem;
    border-radius: 4px;
    opacity: 0.7;
    transition: opacity 0.2s, background 0.2s;
  }

  .screen-nav a:hover {
    opacity: 1;
    background: rgba(0, 255, 255, 0.1);
  }
</style>
</head>
<body>

<!-- ── HUD: wird während des Spiels aktualisiert ── -->
<div id="ui">
  <span id="scoreDisplay">Punkte: 0</span>
  <span id="livesDisplay">Leben: ♥♥♥</span>
  <span id="levelDisplay">Level: 1</span>
</div>

<!-- Canvas: hier wird das Spiel gerendert -->
<canvas id="gameCanvas"></canvas>

<!-- ── Startbildschirm ── -->
<div id="startScreen">
  <h1>⚡ SPACE SHOOTER ⚡</h1>
  <div class="info">
    ← → oder A/D — Bewegen<br>
    LEERTASTE — Schießen<br>
    Zerstöre alle Feinde und überlebe!
  </div>
  <button id="startBtn">START</button>
  <!-- Navigation zurück zu den anderen Seiten -->
  <nav class="screen-nav">
    <a href="index.html">← Startseite</a>
    <a href="lebenslauf.html">Lebenslauf</a>
  </nav>
</div>

<!-- ── Game-Over-Bildschirm ── -->
<div id="gameOverScreen">
  <h2>GAME OVER</h2>
  <div id="finalScore"></div>
  <button id="restartBtn">NOCHMAL</button>
  <!-- Navigation auch nach dem Spiel anbieten -->
  <nav class="screen-nav">
    <a href="index.html">← Startseite</a>
    <a href="lebenslauf.html">Lebenslauf</a>
  </nav>
</div>

<script>
/* ════════════════════════════════════════════════
   Space Shooter – Hauptcode
   ════════════════════════════════════════════════ */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Spielfeld-Größe festlegen
canvas.width = 800;
canvas.height = 600;

/* ── Globaler Spielzustand ── */
let game = {
  running: false,
  score: 0,
  lives: 3,
  level: 1,
  enemySpeed: 1,
  enemySpawnRate: 60, // Frames zwischen Gegnerspawns
  frameCount: 0,
  keys: {}             // Gedrückte Tasten werden hier gespeichert
};

// Spielobjekte (werden bei Spielstart initialisiert)
let player, bullets, enemies, particles, stars, powerUps;

/* ══════════════════════════════
   Hintergrundsterne
   ══════════════════════════════ */

// 150 zufällige Sterne erzeugen
function createStars() {
  stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 2 + 0.5,
      brightness: Math.random()
    });
  }
}

// Sterne nach unten bewegen und oben wieder erscheinen lassen
function updateStars() {
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
    // Flackern durch Sinusfunktion
    s.brightness = 0.5 + Math.sin(game.frameCount * 0.05 + s.x) * 0.5;
  });
}

// Sterne als kleine weiße Quadrate zeichnen
function drawStars() {
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });
}

/* ══════════════════════════════
   Spieler (Raumschiff)
   ══════════════════════════════ */

// Spieler-Objekt mit Startposition und Eigenschaften erstellen
function createPlayer() {
  return {
    x: canvas.width / 2,
    y: canvas.height - 80,
    width: 40,
    height: 50,
    speed: 6,
    shootCooldown: 0,  // Frames bis zum nächsten Schuss
    invincible: 0      // Frames Unverwundbarkeit nach Treffer
  };
}

// Spieler-Raumschiff zeichnen (Pfeilform + Triebwerk + Glow)
function drawPlayer() {
  // Bei Unverwundbarkeit blinken lassen (jede 4. Frame ausblenden)
  if (player.invincible > 0 && Math.floor(game.frameCount / 4) % 2 === 0) return;

  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(-player.vx * 0.033);

  // Flame
  const fh = player.boosting ? 28 + Math.random() * 14 : 14 + Math.random() * 8;
  const fg = ctx.createLinearGradient(0, 22, 0, 22 + fh);
  fg.addColorStop(0,   player.boosting ? '#fff' : '#ff0');
  fg.addColorStop(0.35, '#f80');
  fg.addColorStop(1,   'transparent');
  ctx.fillStyle = fg;
  ctx.beginPath();
  ctx.moveTo(-9, 22); ctx.lineTo(9, 22);
  ctx.lineTo(Math.random() * 6 - 3, 22 + fh);
  ctx.closePath(); ctx.fill();

  // Hull
  ctx.fillStyle = player.shield > 0 ? '#0cf' : '#c44';
  ctx.beginPath();
  ctx.moveTo( 0, -26); ctx.lineTo(-20, 26);
  ctx.lineTo(-8, 19);  ctx.lineTo(  0, 26);
  ctx.lineTo( 8, 19);  ctx.lineTo( 20, 26);
  ctx.closePath(); ctx.fill();

  // Wings
  ctx.fillStyle = player.boosting ? '#fa0' : '#08a';
  ctx.beginPath(); ctx.moveTo(-20, 26); ctx.lineTo(-32, 14); ctx.lineTo(-22, 4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo( 20, 26); ctx.lineTo( 32, 14); ctx.lineTo( 22, 4); ctx.closePath(); ctx.fill();

  // Cockpit
  ctx.fillStyle = '#0ff';
  ctx.beginPath(); ctx.arc(0, -8, 6, 0, Math.PI * 2); ctx.fill();

  // Glow outline
  ctx.shadowColor = player.boosting ? '#f80' : '#0ff';
  ctx.shadowBlur  = player.boosting ? 22 : 14;
  ctx.strokeStyle = ctx.shadowColor;
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -26); ctx.lineTo(-20, 26); ctx.lineTo(20, 26); ctx.closePath();
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Shield bubble
  if (player.shield > 0) {
    const sa = (player.shield / player.maxShield) * 0.28 + 0.05;
    ctx.strokeStyle = 'rgba(0,220,255,' + sa + ')';
    ctx.lineWidth   = 2;
    ctx.shadowColor = '#0cf';
    ctx.shadowBlur  = 8;
    ctx.beginPath(); ctx.ellipse(0, 0, 30, 34, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

// ================================================================
//  PLAYER BULLETS
// ================================================================
function shoot() {
  audio.play('shoot');
  if (player.spreadShot) {
    bullets.push({ x: player.x,      y: player.y - 26, vx:   0,   vy: -13 });
    bullets.push({ x: player.x -  8, y: player.y - 18, vx:  -2.8, vy: -12 });
    bullets.push({ x: player.x +  8, y: player.y - 18, vx:   2.8, vy: -12 });
  } else {
    bullets.push({ x: player.x, y: player.y - 26, vx: 0, vy: -13 });
  }
}

function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].x += bullets[i].vx;
    bullets[i].y += bullets[i].vy;
    if (bullets[i].y < -20 || bullets[i].x < -10 || bullets[i].x > canvas.width + 10)
      bullets.splice(i, 1);
  }
}

  // Triebwerk-Flamme mit zufälliger Höhe für Flacker-Effekt
  const flameHeight = 15 + Math.random() * 10;
  const flameGrad = ctx.createLinearGradient(0, 25, 0, 25 + flameHeight);
  flameGrad.addColorStop(0, '#ff0');
  flameGrad.addColorStop(0.5, '#f80');
  flameGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = flameGrad;
  ctx.beginPath();
  ctx.moveTo(-8, 25);
  ctx.lineTo(8, 25);
  ctx.lineTo(Math.random() * 6 - 3, 25 + flameHeight);
  ctx.closePath();
  ctx.fill();

  // Rumpf des Raumschiffs (Pfeilform in Cyan)
  ctx.fillStyle = '#0cf';
  ctx.beginPath();
  ctx.moveTo(0, -25);
  ctx.lineTo(-20, 25);
  ctx.lineTo(-8, 20);
  ctx.lineTo(0, 25);
  ctx.lineTo(8, 20);
  ctx.lineTo(20, 25);
  ctx.closePath();
  ctx.fill();

  // Cockpit-Kreis oben auf dem Rumpf
  ctx.fillStyle = '#0ff';
  ctx.beginPath();
  ctx.arc(0, -5, 5, 0, Math.PI * 2);
  ctx.fill();

  // Leuchtender Umriss (Glow-Effekt)
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 15;
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -25);
  ctx.lineTo(-20, 25);
  ctx.lineTo(20, 25);
  ctx.closePath();
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// ================================================================
//  ENEMY BULLETS
// ================================================================
function updateEBullets() {
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const eb = eBullets[i];
    eb.x += eb.vx; eb.y += eb.vy;
    if (eb.y > canvas.height + 20 || eb.y < -20 || eb.x < -20 || eb.x > canvas.width + 20) {
      eBullets.splice(i, 1); continue;
    }
    if (player.invincible <= 0 &&
        Math.abs(eb.x - player.x) < 14 && Math.abs(eb.y - player.y) < 18) {
      eBullets.splice(i, 1);
      spawnExp(eb.x, eb.y, '#f88', 8);
      hitPlayer();
    }
  }
}

function drawEBullets() {
  eBullets.forEach(eb => {
    ctx.shadowColor = eb.col || '#f44';
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = eb.col || '#f44';
    ctx.beginPath();
    ctx.arc(eb.x, eb.y, eb.r || 4, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;
}

// ================================================================
//  ENEMIES
// ================================================================
function mkEnemy(overrides) {
  const rnd = Math.random();
  let type;
  if      (rnd < 0.55) type = 'standard';
  else if (rnd < 0.75) type = 'fast';
  else if (rnd < 0.88) type = 'tank';
  else                 type = 'sniper';

  const base = {
    x: Math.random() * (canvas.width - 60) + 30,
    y: -35,
    vx: 0, vy: 0,
    shootTimer: 60 + Math.floor(Math.random() * 80),
    ...(overrides || {})
  };

  const defs = {
    standard: { w: 30, h: 30, speed: game.enemySpeed + Math.random() * 1.5, hp: 1, maxHp: 1, col: '#f55', pts: 10 },
    fast:     { w: 22, h: 22, speed: game.enemySpeed + 2.5 + Math.random(), hp: 1, maxHp: 1, col: '#f0f', pts: 20 },
    tank:     { w: 40, h: 40, speed: game.enemySpeed * 0.6,                 hp: 3, maxHp: 3, col: '#fa0', pts: 30 },
    sniper:   { w: 28, h: 28, speed: game.enemySpeed * 0.75,                hp: 2, maxHp: 2, col: '#0f8', pts: 25, shootTimer: 70 },
  };

  const t = (overrides && overrides.type) ? overrides.type : type;
  return Object.assign({}, base, { type: t }, defs[t]);
}

function spawnFormation() {
  const cx = Math.random() * (canvas.width - 220) + 110;
  [{ dx: 0, dy: 0 }, { dx: -55, dy: 28 }, { dx: 55, dy: 28 },
   { dx: -110, dy: 56 }, { dx: 110, dy: 56 }
  ].forEach(p => enemies.push(mkEnemy({ type: 'standard', x: cx + p.dx, y: -55 + p.dy })));
}

function enemyFire(e) {
  const dx = player.x - e.x, dy = player.y - e.y;
  const d  = Math.hypot(dx, dy);
  if (e.type === 'sniper') {
    eBullets.push({ x: e.x, y: e.y + e.h / 2, vx: dx / d * 7, vy: dy / d * 7, r: 5, col: '#0ff' });
    audio.play('enemyshoot');
  } else if (e.type === 'tank') {
    [-0.3, 0, 0.3].forEach(off => {
      const ang = Math.atan2(dy, dx) + off;
      eBullets.push({ x: e.x, y: e.y + e.h / 2, vx: Math.cos(ang) * 3, vy: Math.sin(ang) * 3, r: 4, col: '#fa0' });
    });
    audio.play('enemyshoot');
  } else {
    eBullets.push({ x: e.x, y: e.y + e.h / 2, vx: 0, vy: 3.2, r: 3, col: '#f55' });
  }
}

  ctx.restore();
}

// Spielerposition anhand der gedrückten Tasten aktualisieren
function updatePlayer() {
  if (game.keys['ArrowLeft'] || game.keys['KeyA']) player.x -= player.speed;
  if (game.keys['ArrowRight'] || game.keys['KeyD']) player.x += player.speed;
  if (game.keys['ArrowUp'] || game.keys['KeyW']) player.y -= player.speed;
  if (game.keys['ArrowDown'] || game.keys['KeyS']) player.y += player.speed;

  // Spieler innerhalb des Canvas halten
  player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
  player.y = Math.max(30, Math.min(canvas.height - 30, player.y));

  if (player.shootCooldown > 0) player.shootCooldown--;
  if (player.invincible > 0) player.invincible--;

  // Schießen wenn Leertaste gedrückt und Cooldown abgelaufen
  if (game.keys['Space'] && player.shootCooldown === 0) {
    shoot();
    player.shootCooldown = 10;
  }
}

/* ══════════════════════════════
   Projektile (Bullets)
   ══════════════════════════════ */

// Neues Projektil an der Spielerposition erzeugen
function shoot() {
  bullets.push({ x: player.x, y: player.y - 25, width: 4, height: 14, speed: 10 });
}

// Projektile nach oben bewegen und entfernen wenn außerhalb
function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y -= bullets[i].speed;
    if (bullets[i].y < -20) bullets.splice(i, 1);
  }
}

// Projektile als gelbe Rechtecke mit Glow zeichnen
function drawBullets() {
  bullets.forEach(b => {
    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.height);
    grad.addColorStop(0, '#ff0');
    grad.addColorStop(1, '#f80');
    ctx.fillStyle = grad;
    ctx.fillRect(b.x - b.width / 2, b.y, b.width, b.height);

    // Glow über zweites fillRect
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 10;
    ctx.fillRect(b.x - b.width / 2, b.y, b.width, b.height);
    ctx.shadowBlur = 0;
  });
}

/* ══════════════════════════════
   Gegner (Enemies)
   ══════════════════════════════ */

// Zufälligen Gegner vom Typ Standard / Schnell / Tank spawnen
function spawnEnemy() {
  const type = Math.random();
  let enemy;

  if (type < 0.6) {
    // Standard-Gegner: mittelschnell, 1 HP
    enemy = {
      x: Math.random() * (canvas.width - 40) + 20,
      y: -30,
      width: 30, height: 30,
      speed: game.enemySpeed + Math.random() * 1.5,
      hp: 1, type: 'standard', color: '#f55'
    };
  } else if (type < 0.85) {
    // Schneller Gegner: zickzack-Bewegung, 1 HP
    enemy = {
      x: Math.random() * (canvas.width - 40) + 20,
      y: -30,
      width: 22, height: 22,
      speed: game.enemySpeed + 2 + Math.random(),
      hp: 1, type: 'fast', color: '#f0f'
    };
  } else {
    // Tank-Gegner: langsam, 3 HP, Hexagon-Form
    enemy = {
      x: Math.random() * (canvas.width - 40) + 20,
      y: -30,
      width: 40, height: 40,
      speed: game.enemySpeed * 0.6,
      hp: 3, type: 'tank', color: '#fa0'
    };
  }
  enemies.push(enemy);
}

// Gegner bewegen, Kollisionen prüfen und ggf. entfernen
function updateEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;
    if (e.type === 'fast')   e.x += Math.sin(game.frameCount * 0.1 + i * 1.4) * 2.5;
    if (e.type === 'sniper') e.x += Math.sin(game.frameCount * 0.03 + i) * 0.6;
    e.x = Math.max(10, Math.min(canvas.width - 10, e.x));

    if (game.wave >= 2) {
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        enemyFire(e);
        e.shootTimer = (e.type === 'sniper' ? 90 : 120) + Math.floor(Math.random() * 100);
      }
    }

    // Schnelle Gegner bewegen sich seitlich (Sinusbewegung)
    if (e.type === 'fast') {
      e.x += Math.sin(game.frameCount * 0.08 + i) * 2;
    }

    // Gegner entfernen wenn unterhalb des Canvas
    if (e.y > canvas.height + 40) {
      enemies.splice(i, 1);
      continue;
    }

    // Kollision Gegner → Spieler
    if (player.invincible <= 0 && rectCollision(player, e, 18)) {
      enemies.splice(i, 1);
      spawnExplosion(e.x, e.y, e.color, 15);
      loseLife();
      continue;
    }
    if (dead) continue;
  }
}

    // Kollision Gegner → Projektile
    for (let j = bullets.length - 1; j >= 0; j--) {
      if (rectCollision(bullets[j], e, 15)) {
        bullets.splice(j, 1);
        e.hp--;
        spawnExplosion(e.x, e.y, '#ff0', 5);
        if (e.hp <= 0) {
          spawnExplosion(e.x, e.y, e.color, 20);
          // Punktewert je nach Gegnertyp
          game.score += e.type === 'tank' ? 30 : e.type === 'fast' ? 20 : 10;
          enemies.splice(i, 1);
          updateUI();
        }
        break;
      }
    }
  }
}

// Gegner zeichnen – jeder Typ hat eine eigene Form
function drawEnemies() {
  enemies.forEach(e => {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.shadowColor = e.col;
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = e.col;

    if (e.type === 'standard') {
      ctx.beginPath();
      ctx.moveTo(0, -15); ctx.lineTo(-15, 10);
      ctx.lineTo(-5, 5);  ctx.lineTo(0, 15);
      ctx.lineTo(5, 5);   ctx.lineTo(15, 10);
      ctx.closePath(); ctx.fill();
    } else if (e.type === 'fast') {
      ctx.beginPath();
      ctx.moveTo(0, -12); ctx.lineTo(-12, 12); ctx.lineTo(12, 12);
      ctx.closePath(); ctx.fill();
    } else if (e.type === 'tank') {
      ctx.beginPath();
      for (let k = 0; k < 6; k++) {
        const a = (Math.PI / 3) * k - Math.PI / 2;
        k === 0 ? ctx.moveTo(Math.cos(a)*20, Math.sin(a)*20)
                : ctx.lineTo(Math.cos(a)*20, Math.sin(a)*20);
      }
      ctx.closePath(); ctx.fill();
      const bw = 36;
      ctx.fillStyle = '#300';  ctx.fillRect(-bw/2, -27, bw, 4);
      ctx.fillStyle = '#f80';  ctx.fillRect(-bw/2, -27, bw * (e.hp / e.maxHp), 4);
      ctx.fillStyle = '#fff';  ctx.font = '11px Courier New'; ctx.textAlign = 'center';
      ctx.shadowBlur = 0;      ctx.fillText(e.hp, 0, 5);
    } else if (e.type === 'sniper') {
      ctx.beginPath();
      ctx.moveTo(0, -15); ctx.lineTo(14, 0); ctx.lineTo(0, 15); ctx.lineTo(-14, 0);
      ctx.closePath(); ctx.fill();
      if (e.shootTimer < 28) {
        const alpha = (28 - e.shootTimer) / 28 * 0.55;
        ctx.strokeStyle = 'rgba(0,255,140,' + alpha + ')';
        ctx.lineWidth   = 1;
        ctx.shadowBlur  = 0;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(player.x - e.x, player.y - e.y);
        ctx.stroke();
      }
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  });
}

    if (e.type === 'standard') {
      // Standard: invertiertes Dreieck (Pfeil nach unten)
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.moveTo(0, -15);
      ctx.lineTo(-15, 10);
      ctx.lineTo(-5, 5);
      ctx.lineTo(0, 15);
      ctx.lineTo(5, 5);
      ctx.lineTo(15, 10);
      ctx.closePath();
      ctx.fill();
    } else if (e.type === 'fast') {
      // Schnell: einfaches Dreieck
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.moveTo(0, -12);
      ctx.lineTo(-12, 12);
      ctx.lineTo(12, 12);
      ctx.closePath();
      ctx.fill();
    } else {
      // Tank: regelmäßiges Hexagon
      ctx.fillStyle = e.color;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 2;
        const px = Math.cos(angle) * 20;
        const py = Math.sin(angle) * 20;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();

      // Verbleibende HP anzeigen
      ctx.fillStyle = '#fff';
      ctx.font = '12px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(e.hp, 0, 5);
    }
  }

    ctx.restore();
  });
}

/* ══════════════════════════════
   Partikel / Explosionen
   ══════════════════════════════ */

// Explosionspartikel an Position (x, y) in Farbe color erzeugen
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      size: Math.random() * 3 + 1,
      color
    });
  }
}

// Partikel bewegen und abgelaufene entfernen
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// Partikel als kleine Quadrate zeichnen, Transparenz nimmt mit Leben ab
function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1; // Alpha zurücksetzen
}

/* ══════════════════════════════
   Hilfsfunktionen
   ══════════════════════════════ */

// Einfache AABB-Kollisionsprüfung mit angepasstem Margin
function rectCollision(a, b, margin) {
  return Math.abs(a.x - b.x) < margin + (b.width || 0) / 2 &&
         Math.abs(a.y - b.y) < margin + (b.height || 0) / 2;
}

// Leben abziehen, kurze Unverwundbarkeit setzen und ggf. Game Over
function loseLife() {
  game.lives--;
  player.invincible = 90; // ~1,5 Sekunden bei 60 fps
  updateUI();
  if (game.lives <= 0) gameOver();
}

// HUD-Anzeigen aktualisieren
function updateUI() {
  document.getElementById('scoreDisplay').textContent = `Punkte: ${game.score}`;
  document.getElementById('livesDisplay').textContent = `Leben: ${'♥'.repeat(Math.max(0, game.lives))}`;
  document.getElementById('levelDisplay').textContent = `Level: ${game.level}`;
}

// Level erhöhen wenn genug Punkte erreicht wurden
function checkLevelUp() {
  const newLevel = Math.floor(game.score / 100) + 1;
  if (newLevel > game.level) {
    game.level = newLevel;
    game.enemySpeed = 1 + game.level * 0.3;           // Gegner werden schneller
    game.enemySpawnRate = Math.max(15, 60 - game.level * 5); // Spawn-Rate steigt
    updateUI();
  }
}

/* ══════════════════════════════
   Haupt-Game-Loop
   ══════════════════════════════ */
function gameLoop() {
  if (!game.running) return;
  if (game.paused)   { requestAnimationFrame(gameLoop); return; }

  // Hintergrund schwarz füllen
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Reihenfolge: Hintergrund → Spieler → Projektile → Gegner → Partikel
  updateStars();
  drawStars();

  updatePlayer();
  drawPlayer();

  updateBullets();
  drawBullets();

  game.frameCount++;
  if (game.frameCount % game.enemySpawnRate === 0) spawnEnemy();

  updateEnemies();
  drawEnemies();

  updateParticles();
  drawParticles();

  updateEBullets();  drawEBullets();
  updatePowerUps();  drawPowerUps();
  updateParticles(); drawParticles();
  updateFloatTexts(); drawFloatTexts();

  requestAnimationFrame(gameLoop);
}

/* ══════════════════════════════
   Spielzustands-Verwaltung
   ══════════════════════════════ */

// Neues Spiel starten (oder neustarten)
function startGame() {
  game = {
    running: true,
    score: 0,
    lives: 3,
    level: 1,
    enemySpeed: 1,
    enemySpawnRate: 60,
    frameCount: 0,
    keys: game.keys // Tastenstate beibehalten
  };

  player = createPlayer();
  bullets = [];
  enemies = [];
  particles = [];
  createStars();
  updateUI();

  // Menü-Bildschirme ausblenden
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameOverScreen').style.display = 'none';
  document.getElementById('upgradeScreen').style.display  = 'none';
  document.getElementById('announcement').style.display   = 'none';

  gameLoop();
}

// Spiel beenden und Game-Over-Screen anzeigen
function gameOver() {
  game.running = false;
  document.getElementById('finalScore').textContent =
    `Endpunktzahl: ${game.score} | Level: ${game.level}`;
  document.getElementById('gameOverScreen').style.display = 'flex';
}

/* ══════════════════════════════
   Tastatur-Events
   ══════════════════════════════ */

// Gedrückte Taste in game.keys speichern
document.addEventListener('keydown', e => {
  game.keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault(); // Scrollen durch Leertaste verhindern
});
document.addEventListener('keyup', function(e) { game.keys[e.code] = false; });

// Taste wieder freigeben
document.addEventListener('keyup', e => {
  game.keys[e.code] = false;
});

// Button-Events
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

/* ══════════════════════════════
   Hintergrundanimation im Menü
   ══════════════════════════════ */

// Sterne auch auf dem Startbildschirm animieren (vor Spielstart)
createStars();
(function animateBackground() {
  if (game.running) return; // Stoppen wenn Spiel läuft
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  updateStars();
  drawStars();
  requestAnimationFrame(animateBackground);
})();

ctx.clearRect(0, 0, canvas.width, canvas.height);
</script>
