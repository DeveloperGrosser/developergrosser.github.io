<!DOCTYPE html>  
<html lang="de">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Space Shooter</title>  
<style>  
  * {  
    margin: 0;  
    padding: 0;  
    box-sizing: border-box;  
  }

  body {  
    background: #000;  
    overflow: hidden;  
    font-family: 'Courier New', monospace;  
    color: #fff;  
  }

  canvas {  
    display: block;  
    margin: 0 auto;  
  }

  #ui {  
    position: absolute;  
    top: 10px;  
    left: 50%;  
    transform: translateX(-50%);  
    width: 800px;  
    display: flex;  
    justify-content: space-between;  
    padding: 0 20px;  
    font-size: 18px;  
    z-index: 10;  
    pointer-events: none;  
  }

  #startScreen, #gameOverScreen {  
    position: absolute;  
    top: 0; left: 0; right: 0; bottom: 0;  
    display: flex;  
    flex-direction: column;  
    justify-content: center;  
    align-items: center;  
    background: rgba(0,0,0,0.85);  
    z-index: 20;  
  }

  #gameOverScreen { display: none; }

  h1 {  
    font-size: 48px;  
    margin-bottom: 10px;  
    color: #0ff;  
    text-shadow: 0 0 20px #0ff;  
  }

  h2 {  
    font-size: 28px;  
    color: #f55;  
    text-shadow: 0 0 15px #f55;  
    margin-bottom: 10px;  
  }

  .info {  
    font-size: 16px;  
    color: #aaa;  
    margin-bottom: 30px;  
    text-align: center;  
    line-height: 1.6;  
  }

  button {  
    padding: 12px 40px;  
    font-size: 20px;  
    font-family: 'Courier New', monospace;  
    background: transparent;  
    color: #0ff;  
    border: 2px solid #0ff;  
    cursor: pointer;  
    transition: all 0.3s;  
  }

  button:hover {  
    background: #0ff;  
    color: #000;  
  }

  #finalScore {  
    font-size: 22px;  
    color: #ff0;  
    margin-bottom: 20px;  
  }  
</style>  
</head>  
<body>

<div id="ui">  
  <span id="scoreDisplay">Punkte: 0</span>  
  <span id="livesDisplay">Leben: ♥♥♥</span>  
  <span id="levelDisplay">Level: 1</span>  
</div>

<canvas id="gameCanvas"></canvas>

<div id="startScreen">  
  <h1>⚡ SPACE SHOOTER ⚡</h1>  
  <div class="info">  
    ← → oder A/D — Bewegen<br>  
    LEERTASTE — Schießen<br>  
    Zerstöre alle Feinde und überlebe!  
  </div>  
  <button id="startBtn">START</button>  
</div>

<div id="gameOverScreen">  
  <h2>GAME OVER</h2>  
  <div id="finalScore"></div>  
  <button id="restartBtn">NOCHMAL</button>  
</div>

<script>  
const canvas = document.getElementById('gameCanvas');  
const ctx = canvas.getContext('2d');

canvas.width = 800;  
canvas.height = 600;

// --- STATE ---  
let game = {  
  running: false,  
  score: 0,  
  lives: 3,  
  level: 1,  
  enemySpeed: 1,  
  enemySpawnRate: 60,  
  frameCount: 0,  
  keys: {}  
};

let player, bullets, enemies, particles, stars, powerUps;

// --- STARS (Hintergrund) ---  
function createStars() {  
  stars = [];  
  for (let i = 0; i < 150; i++) {  
    stars.push({  
      x: Math.random() * canvas.width,  
      y: Math.random() * canvas.height,  
      size: Math.random() * 2 + 0.5,  
      speed: Math.random() * 2 + 0.5,  
      brightness: Math.random()  
    });  
  }  
}

function updateStars() {  
  stars.forEach(s => {  
    s.y += s.speed;  
    if (s.y > canvas.height) {  
      s.y = 0;  
      s.x = Math.random() * canvas.width;  
    }  
    s.brightness = 0.5 + Math.sin(game.frameCount * 0.05 + s.x) * 0.5;  
  });  
}

function drawStars() {  
  stars.forEach(s => {  
    ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;  
    ctx.fillRect(s.x, s.y, s.size, s.size);  
  });  
}

// --- PLAYER ---  
function createPlayer() {  
  return {  
    x: canvas.width / 2,  
    y: canvas.height - 80,  
    width: 40,  
    height: 50,  
    speed: 6,  
    shootCooldown: 0,  
    invincible: 0  
  };  
}

function drawPlayer() {  
  if (player.invincible > 0 && Math.floor(game.frameCount / 4) % 2 === 0) return;

  ctx.save();  
  ctx.translate(player.x, player.y);

  // Triebwerk  
  const flameHeight = 15 + Math.random() * 10;  
  const flameGrad = ctx.createLinearGradient(0, 25, 0, 25 + flameHeight);  
  flameGrad.addColorStop(0, '#ff0');  
  flameGrad.addColorStop(0.5, '#f80');  
  flameGrad.addColorStop(1, 'transparent');  
  ctx.fillStyle = flameGrad;  
  ctx.beginPath();  
  ctx.moveTo(-8, 25);  
  ctx.lineTo(8, 25);  
  ctx.lineTo(Math.random() * 6 - 3, 25 + flameHeight);  
  ctx.closePath();  
  ctx.fill();

  // Rumpf  
  ctx.fillStyle = '#0cf';  
  ctx.beginPath();  
  ctx.moveTo(0, -25);  
  ctx.lineTo(-20, 25);  
  ctx.lineTo(-8, 20);  
  ctx.lineTo(0, 25);  
  ctx.lineTo(8, 20);  
  ctx.lineTo(20, 25);  
  ctx.closePath();  
  ctx.fill();

  // Cockpit  
  ctx.fillStyle = '#0ff';  
  ctx.beginPath();  
  ctx.arc(0, -5, 5, 0, Math.PI * 2);  
  ctx.fill();

  // Glow  
  ctx.shadowColor = '#0ff';  
  ctx.shadowBlur = 15;  
  ctx.strokeStyle = '#0ff';  
  ctx.lineWidth = 1;  
  ctx.beginPath();  
  ctx.moveTo(0, -25);  
  ctx.lineTo(-20, 25);  
  ctx.lineTo(20, 25);  
  ctx.closePath();  
  ctx.stroke();  
  ctx.shadowBlur = 0;

  ctx.restore();  
}

function updatePlayer() {  
  if (game.keys['ArrowLeft'] || game.keys['KeyA']) player.x -= player.speed;  
  if (game.keys['ArrowRight'] || game.keys['KeyD']) player.x += player.speed;  
  if (game.keys['ArrowUp'] || game.keys['KeyW']) player.y -= player.speed;  
  if (game.keys['ArrowDown'] || game.keys['KeyS']) player.y += player.speed;

  player.x = Math.max(20, Math.min(canvas.width - 20, player.x));  
  player.y = Math.max(30, Math.min(canvas.height - 30, player.y));

  if (player.shootCooldown > 0) player.shootCooldown--;  
  if (player.invincible > 0) player.invincible--;

  if (game.keys['Space'] && player.shootCooldown === 0) {  
    shoot();  
    player.shootCooldown = 10;  
  }  
}

// --- BULLETS ---  
function shoot() {  
  bullets.push({ x: player.x, y: player.y - 25, width: 4, height: 14, speed: 10 });  
}

function updateBullets() {  
  for (let i = bullets.length - 1; i >= 0; i--) {  
    bullets[i].y -= bullets[i].speed;  
    if (bullets[i].y < -20) bullets.splice(i, 1);  
  }  
}

function drawBullets() {  
  bullets.forEach(b => {  
    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.height);  
    grad.addColorStop(0, '#ff0');  
    grad.addColorStop(1, '#f80');  
    ctx.fillStyle = grad;  
    ctx.fillRect(b.x - b.width / 2, b.y, b.width, b.height);

    ctx.shadowColor = '#ff0';  
    ctx.shadowBlur = 10;  
    ctx.fillRect(b.x - b.width / 2, b.y, b.width, b.height);  
    ctx.shadowBlur = 0;  
  });  
}

// --- ENEMIES ---  
function spawnEnemy() {  
  const type = Math.random();  
  let enemy;

  if (type < 0.6) {  
    // Standard  
    enemy = {  
      x: Math.random() * (canvas.width - 40) + 20,  
      y: -30,  
      width: 30, height: 30,  
      speed: game.enemySpeed + Math.random() * 1.5,  
      hp: 1, type: 'standard', color: '#f55'  
    };  
  } else if (type < 0.85) {  
    // Schnell  
    enemy = {  
      x: Math.random() * (canvas.width - 40) + 20,  
      y: -30,  
      width: 22, height: 22,  
      speed: game.enemySpeed + 2 + Math.random(),  
      hp: 1, type: 'fast', color: '#f0f'  
    };  
  } else {  
    // Tank  
    enemy = {  
      x: Math.random() * (canvas.width - 40) + 20,  
      y: -30,  
      width: 40, height: 40,  
      speed: game.enemySpeed * 0.6,  
      hp: 3, type: 'tank', color: '#fa0'  
    };  
  }  
  enemies.push(enemy);  
}

function updateEnemies() {  
  for (let i = enemies.length - 1; i >= 0; i--) {  
    const e = enemies[i];  
    e.y += e.speed;

    if (e.type === 'fast') {  
      e.x += Math.sin(game.frameCount * 0.08 + i) * 2;  
    }

    if (e.y > canvas.height + 40) {  
      enemies.splice(i, 1);  
      continue;  
    }

    // Kollision mit Spieler  
    if (player.invincible <= 0 && rectCollision(player, e, 18)) {  
      enemies.splice(i, 1);  
      spawnExplosion(e.x, e.y, e.color, 15);  
      loseLife();  
      continue;  
    }

    // Kollision mit Kugeln  
    for (let j = bullets.length - 1; j >= 0; j--) {  
      if (rectCollision(bullets[j], e, 15)) {  
        bullets.splice(j, 1);  
        e.hp--;  
        spawnExplosion(e.x, e.y, '#ff0', 5);  
        if (e.hp <= 0) {  
          spawnExplosion(e.x, e.y, e.color, 20);  
          game.score += e.type === 'tank' ? 30 : e.type === 'fast' ? 20 : 10;  
          enemies.splice(i, 1);  
          updateUI();  
        }  
        break;  
      }  
    }  
  }  
}

function drawEnemies() {  
  enemies.forEach(e => {  
    ctx.save();  
    ctx.translate(e.x, e.y);

    if (e.type === 'standard') {  
      ctx.fillStyle = e.color;  
      ctx.beginPath();  
      ctx.moveTo(0, -15);  
      ctx.lineTo(-15, 10);  
      ctx.lineTo(-5, 5);  
      ctx.lineTo(0, 15);  
      ctx.lineTo(5, 5);  
      ctx.lineTo(15, 10);  
      ctx.closePath();  
      ctx.fill();  
    } else if (e.type === 'fast') {  
      ctx.fillStyle = e.color;  
      ctx.beginPath();  
      ctx.moveTo(0, -12);  
      ctx.lineTo(-12, 12);  
      ctx.lineTo(12, 12);  
      ctx.closePath();  
      ctx.fill();  
    } else {  
      ctx.fillStyle = e.color;  
      ctx.beginPath();  
      // Tank-Enemy (Hexagon)
      for (let i = 0; i < 6; i++) {  
        const angle = (Math.PI / 3) * i - Math.PI / 2;  
        const px = Math.cos(angle) * 20;  
        const py = Math.sin(angle) * 20;  
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);  
      }
      ctx.closePath();  
      ctx.fill();

      // HP Anzeige  
      ctx.fillStyle = '#fff';  
      ctx.font = '12px Courier New';  
      ctx.textAlign = 'center';  
      ctx.fillText(e.hp, 0, 5);  
    }

    ctx.restore();  
  });  
}

// --- PARTICLES ---  
function spawnExplosion(x, y, color, count) {  
  for (let i = 0; i < count; i++) {  
    const angle = Math.random() * Math.PI * 2;  
    const speed = Math.random() * 4 + 1;  
    particles.push({  
      x, y,  
      vx: Math.cos(angle) * speed,  
      vy: Math.sin(angle) * speed,  
      life: 30 + Math.random() * 20,  
      maxLife: 50,  
      size: Math.random() * 3 + 1,  
      color  
    });  
  }  
}

function updateParticles() {  
  for (let i = particles.length - 1; i >= 0; i--) {  
    const p = particles[i];  
    p.x += p.vx;  
    p.y += p.vy;  
    p.life--;  
    if (p.life <= 0) particles.splice(i, 1);  
  }  
}

function drawParticles() {  
  particles.forEach(p => {  
    const alpha = p.life / p.maxLife;  
    ctx.globalAlpha = alpha;  
    ctx.fillStyle = p.color;  
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);  
  });  
  ctx.globalAlpha = 1;  
}

// --- UTILITY ---  
function rectCollision(a, b, margin) {  
  return Math.abs(a.x - b.x) < margin + (b.width || 0) / 2 &&  
         Math.abs(a.y - b.y) < margin + (b.height || 0) / 2;  
}

function loseLife() {  
  game.lives--;  
  player.invincible = 90;  
  updateUI();  
  if (game.lives <= 0) gameOver();  
}

function updateUI() {  
  document.getElementById('scoreDisplay').textContent = `Punkte: ${game.score}`;  
  document.getElementById('livesDisplay').textContent = `Leben: ${'♥'.repeat(Math.max(0, game.lives))}`;  
  document.getElementById('levelDisplay').textContent = `Level: ${game.level}`;  
}

function checkLevelUp() {  
  const newLevel = Math.floor(game.score / 100) + 1;  
  if (newLevel > game.level) {  
    game.level = newLevel;  
    game.enemySpeed = 1 + game.level * 0.3;  
    game.enemySpawnRate = Math.max(15, 60 - game.level * 5);  
    updateUI();  
  }  
}

// --- GAME LOOP ---  
function gameLoop() {  
  if (!game.running) return;

  ctx.fillStyle = '#000';  
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  updateStars();  
  drawStars();

  updatePlayer();  
  drawPlayer();

  updateBullets();  
  drawBullets();

  game.frameCount++;  
  if (game.frameCount % game.enemySpawnRate === 0) spawnEnemy();

  updateEnemies();  
  drawEnemies();

  updateParticles();  
  drawParticles();

  checkLevelUp();

  requestAnimationFrame(gameLoop);  

}

function startGame() {  
  game = {  
    running: true,  
    score: 0,  
    lives: 3,  
    level: 1,  
    enemySpeed: 1,  
    enemySpawnRate: 60,  
    frameCount: 0,  
    keys: game.keys  
  };

  player = createPlayer();  
  bullets = [];  
  enemies = [];  
  particles = [];  
  createStars();  
  updateUI();

  document.getElementById('startScreen').style.display = 'none';  
  document.getElementById('gameOverScreen').style.display = 'none';

  gameLoop();  
}

function gameOver() {  
  game.running = false;  
  document.getElementById('finalScore').textContent = `Endpunktzahl: ${game.score} | Level: ${game.level}`;  
  document.getElementById('gameOverScreen').style.display = 'flex';  
}

// --- EVENTS ---  
document.addEventListener('keydown', e => {  
  game.keys[e.code] = true;  
  if (e.code === 'Space') e.preventDefault();  
});

document.addEventListener('keyup', e => {  
  game.keys[e.code] = false;  
});

document.getElementById('startBtn').addEventListener('click', startGame);  
document.getElementById('restartBtn').addEventListener('click', startGame);

// Initiale Sterne für Startbildschirm  
createStars();  
(function animateBackground() {  
  if (game.running) return;  
  ctx.fillStyle = '#000';  
  ctx.fillRect(0, 0, canvas.width, canvas.height);  
  updateStars();  
  drawStars();  
  requestAnimationFrame(animateBackground);  
})();  

ctx.clearRect(0, 0, canvas.width, canvas.height);
</script>

</body>  
</html>
